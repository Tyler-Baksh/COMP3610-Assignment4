services:
  api:
    build: .
    container_name: taxi-tip-api
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/app/models/rf_reg_tuned.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - FEATURE_COLUMNS_PATH=/app/models/feature_columns.json
      - MODEL_VERSION=1
      - API_HOST=0.0.0.0
      - API_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
